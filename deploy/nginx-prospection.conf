server {
    listen 80;
    server_name audit.srv1380876.hstgr.cloud;

    # Logs
    access_log /var/log/nginx/prospection-access.log;
    error_log  /var/log/nginx/prospection-error.log;

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE : désactiver le buffering pour les logs en direct
        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    370s;
        proxy_connect_timeout 10s;

        # Headers SSE
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Servir les PDFs directement (optionnel, plus rapide)
    location /pdfs/ {
        alias /opt/prospection-agent/output/pdfs/;
        add_header Content-Disposition inline;
    }

    client_max_body_size 10M;
}
