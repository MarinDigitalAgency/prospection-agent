<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrapping Performance Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #080b12;
      --surface:      #0f1421;
      --surface-2:    #141926;
      --border:       #1c2136;
      --border-light: #232a40;
      --accent:       #6366f1;
      --accent-hover: #818cf8;
      --accent-glow:  rgba(99,102,241,.18);
      --text:         #e2e8f0;
      --text-2:       #94a3b8;
      --success:      #22c55e;
      --warning:      #f59e0b;
      --error:        #ef4444;
      --radius:       12px;
      --radius-sm:    8px;
    }

    /* ── Base ── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,.12), transparent);
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,11,18,.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo img { height: 30px; width: auto; display: block; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .header-sub {
      display: none;
      font-size: 12px;
      color: var(--text-2);
      margin-left: 2px;
    }

    .header-nav {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      color: var(--text-2);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .nav-link:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .nav-link-text { display: none; }

    /* ── Main layout ── */
    .layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-2);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      color: var(--text-2);
      transition: all .15s;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.5);
    }

    /* ── Form ── */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
    }

    input[type="text"],
    input[type="url"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder { color: var(--border-light); }

    .limit-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .limit-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
      height: 4px;
    }

    .limit-val {
      width: 28px;
      text-align: center;
      font-weight: 700;
      color: var(--accent);
      font-size: 15px;
    }

    .btn-launch {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-launch:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .btn-launch:active { transform: scale(.98); }
    .btn-launch:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Spinner ── */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Terminal ── */
    #terminal-card { display: none; }

    .terminal-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-2);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-2);
      flex-shrink: 0;
    }

    .dot.running { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    .dot.done    { background: var(--success); }
    .dot.error   { background: var(--error); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

    .terminal {
      margin-top: 14px;
      background: #060810;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 11.5px;
      line-height: 1.75;
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid var(--border);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .log-line { display: flex; gap: 8px; }
    .log-time  { color: #2d3a5a; flex-shrink: 0; }
    .log-level { flex-shrink: 0; width: 54px; font-weight: 600; }
    .log-INFO    .log-level { color: #60a5fa; }
    .log-SUCCESS .log-level { color: var(--success); }
    .log-WARNING .log-level { color: var(--warning); }
    .log-ERROR   .log-level { color: var(--error); }
    .log-text { color: #a8b4cc; word-break: break-all; }

    /* ── Results ── */
    #results-card { display: none; }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-item {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      transition: border-color .15s;
    }

    .result-item:hover { border-color: var(--border-light); }
    .result-item.error-row { border-color: rgba(239,68,68,.2); }

    .score-badge {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
      border: 2px solid;
    }

    .score-green  { color: var(--success); border-color: var(--success);  background: rgba(34,197,94,.08);  }
    .score-yellow { color: var(--warning); border-color: var(--warning);  background: rgba(245,158,11,.08); }
    .score-red    { color: var(--error);   border-color: var(--error);    background: rgba(239,68,68,.08);  }
    .score-none   { color: var(--text-2);  border-color: var(--border);   background: transparent; font-size: 18px; }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-url {
      color: var(--text-2);
      font-size: 12px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .badge-critical { background: rgba(239,68,68,.15);  color: var(--error);   }
    .badge-warning  { background: rgba(245,158,11,.15); color: var(--warning); }
    .badge-info     { background: rgba(99,102,241,.15); color: var(--accent);  }
    .badge-ok       { background: rgba(34,197,94,.1);   color: var(--success); }
    .badge-error    { background: rgba(239,68,68,.1);   color: var(--error);   border: 1px solid rgba(239,68,68,.2); }

    .result-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .btn-action {
      padding: 7px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-2);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: border-color .15s, color .15s, background .15s;
      white-space: nowrap;
    }

    .btn-action:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    /* ── History ── */
    #history-card { display: none; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 28px 16px;
      color: var(--text-2);
      font-size: 13px;
    }

    /* ────────────────────────────────────────────
       BREAKPOINTS
    ──────────────────────────────────────────── */

    /* Tablet ≥ 600px */
    @media (min-width: 600px) {
      header { padding: 0 24px; height: 60px; }
      .header-logo img { height: 34px; }
      .header-title { font-size: 16px; }
      .header-sub { display: inline; }
      .nav-link-text { display: inline; }

      .layout { padding: 24px 24px 48px; gap: 24px; }
      .card { padding: 24px; }

      .form-row { flex-direction: row; align-items: flex-end; }
      .field-limit { width: 180px; flex-shrink: 0; }
    }

    /* Desktop ≥ 960px */
    @media (min-width: 960px) {
      header { padding: 0 40px; }
      .header-logo img { height: 36px; }

      .layout { padding: 32px 32px 60px; }

      /* Form + terminal côte à côte */
      .audit-columns {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 20px;
        align-items: start;
      }

      #terminal-card { margin: 0; }

      .terminal { max-height: 360px; }

      /* Results en grille 2 colonnes */
      .results-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
    }

    /* Large ≥ 1200px */
    @media (min-width: 1200px) {
      .layout { max-width: 1200px; }
      .audit-columns { grid-template-columns: 420px 1fr; }
    }

    /* Small mobile < 400px */
    @media (max-width: 400px) {
      .tab { font-size: 12px; padding: 8px 8px; }
      .result-item { padding: 12px; }
      .result-actions { width: 100%; }
      .btn-action { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-logo">
    <img src="/static/logo.svg" alt="Scrapping Performance Tool">
  </div>
  <div class="header-title">
    Scrapping Performance Tool<span class="header-sub"> — SEO &amp; Performance</span>
  </div>
  <nav class="header-nav">
    <a href="/reports" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="nav-link-text">Rapports</span>
    </a>
  </nav>
</header>

<!-- ── Main ── -->
<div class="layout">

  <div class="audit-columns">

    <!-- ── Formulaire ── -->
    <div class="card" id="form-card">
      <div class="card-header">
        <div class="card-title">Nouvel audit</div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('batch')">🔍 Recherche ville</button>
        <button class="tab" onclick="switchTab('single')">🌐 URL unique</button>
      </div>

      <!-- Mode batch -->
      <div class="form-panel active" id="panel-batch">
        <div class="form-row">
          <div class="field" style="flex:1">
            <label>Requête Google Places</label>
            <input type="text" id="query" placeholder="agence immobilière Palma" />
          </div>
          <div class="field field-limit">
            <label>Prospects</label>
            <div class="limit-control">
              <input type="range" id="limit" min="1" max="20" value="5"
                     oninput="document.getElementById('limit-val').textContent=this.value" />
              <span class="limit-val" id="limit-val">5</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Mode URL unique -->
      <div class="form-panel" id="panel-single">
        <div class="field" style="margin-bottom:16px">
          <label>URL du site</label>
          <input type="url" id="single-url" placeholder="https://agence-exemple.com" />
        </div>
      </div>

      <button class="btn-launch" id="btn-launch" onclick="startAudit()">
        <span id="btn-icon">▶</span>
        <span id="btn-text">Lancer l'audit</span>
      </button>
    </div>

    <!-- ── Terminal ── -->
    <div class="card" id="terminal-card">
      <div class="card-header">
        <div class="card-title">Logs en direct</div>
        <div class="terminal-status">
          <div class="dot" id="status-dot"></div>
          <span id="status-text">En attente…</span>
        </div>
      </div>
      <div class="terminal" id="terminal"></div>
    </div>

  </div>

  <!-- ── Résultats ── -->
  <div class="card" id="results-card">
    <div class="card-header">
      <div class="card-title">Résultats</div>
    </div>
    <div class="results-list" id="results-grid"></div>
  </div>

  <!-- ── Historique ── -->
  <div class="card" id="history-card">
    <div class="card-header">
      <div class="card-title">Dernier audit enregistré</div>
      <a href="/reports" class="btn-action" style="font-size:11px">Voir tout →</a>
    </div>
    <div class="results-list" id="history-grid"></div>
  </div>

</div>

<script>
  let currentMode = 'batch';
  let isRunning = false;

  function switchTab(mode) {
    currentMode = mode;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && mode === 'batch') || (i === 1 && mode === 'single'));
    });
    document.getElementById('panel-batch').classList.toggle('active', mode === 'batch');
    document.getElementById('panel-single').classList.toggle('active', mode === 'single');
  }

  function scoreClass(score) {
    if (score === null || score === undefined) return 'score-none';
    if (score >= 80) return 'score-green';
    if (score >= 50) return 'score-yellow';
    return 'score-red';
  }

  function renderResult(r) {
    const scoreLabel = r.score !== null && r.score !== undefined ? r.score : '—';
    const cls = scoreClass(r.score);
    const issues = r.issues || {};
    const badgesHtml = r.error
      ? `<span class="badge badge-error">Erreur</span>`
      : [
          issues.critical > 0 ? `<span class="badge badge-critical">${issues.critical} critique${issues.critical > 1 ? 's' : ''}</span>` : '',
          issues.warning  > 0 ? `<span class="badge badge-warning">${issues.warning} warning${issues.warning > 1 ? 's' : ''}</span>` : '',
          issues.info     > 0 ? `<span class="badge badge-info">${issues.info} info</span>` : '',
        ].filter(Boolean).join('') || '<span class="badge badge-ok">✓ Aucun problème</span>';

    const htmlBtn = r.html_slug
      ? `<a class="btn-action" href="/reports/${r.html_slug}" target="_blank">
           <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
           HTML
         </a>` : '';

    const pdfBtn = r.pdf_filename
      ? `<a class="btn-action" href="/pdfs/${r.pdf_filename}" target="_blank">
           <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
           PDF
         </a>` : '';

    return `
      <div class="result-item ${r.error ? 'error-row' : ''}">
        <div class="score-badge ${cls}">${scoreLabel}</div>
        <div class="result-info">
          <div class="result-name">${r.name || r.website || '—'}</div>
          <div class="result-url">${r.website || ''}</div>
          <div class="result-badges">${badgesHtml}</div>
        </div>
        <div class="result-actions">${htmlBtn}${pdfBtn}</div>
      </div>`;
  }

  function addLogLine(level, time, text) {
    const term = document.getElementById('terminal');
    const div = document.createElement('div');
    div.className = `log-line log-${level}`;
    div.innerHTML = `<span class="log-time">${time}</span><span class="log-level">${level}</span><span class="log-text">${text}</span>`;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
  }

  function setStatus(state, text) {
    document.getElementById('status-dot').className = `dot ${state}`;
    document.getElementById('status-text').textContent = text;
  }

  async function startAudit() {
    if (isRunning) return;

    const query     = document.getElementById('query').value.trim();
    const singleUrl = document.getElementById('single-url').value.trim();
    const limit     = parseInt(document.getElementById('limit').value);

    if (currentMode === 'batch' && !query)     { document.getElementById('query').focus(); return; }
    if (currentMode === 'single' && !singleUrl){ document.getElementById('single-url').focus(); return; }

    const payload = currentMode === 'batch' ? { query, limit } : { url: singleUrl };

    isRunning = true;
    const btn = document.getElementById('btn-launch');
    btn.disabled = true;
    document.getElementById('btn-icon').innerHTML = '<div class="spinner"></div>';
    document.getElementById('btn-text').textContent = 'Audit en cours…';

    document.getElementById('terminal-card').style.display = 'block';
    document.getElementById('results-card').style.display  = 'none';
    document.getElementById('terminal').innerHTML = '';
    setStatus('running', 'Connexion…');

    // On desktop, scroll to terminal if it's in the column
    if (window.innerWidth < 960) {
      document.getElementById('terminal-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    const res = await fetch('/api/audit/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const { job_id, error } = await res.json();

    if (error) { addLogLine('ERROR', '--:--:--', error); resetBtn(); return; }

    setStatus('running', 'Audit en cours…');

    const evtSource = new EventSource(`/api/stream/${job_id}`);

    evtSource.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'ping') return;
      if (msg.type === 'log') addLogLine(msg.level, msg.time, msg.text);
      if (msg.type === 'done') {
        evtSource.close();
        if (msg.status === 'done' && msg.result) {
          setStatus('done', `Terminé — ${msg.result.filter(r => r.pdf).length} audit(s) réussi(s)`);
          showResults(msg.result);
        } else {
          setStatus('error', `Erreur : ${msg.error || 'inconnue'}`);
        }
        resetBtn();
      }
    };

    evtSource.onerror = () => {
      evtSource.close();
      setStatus('error', 'Connexion perdue');
      resetBtn();
    };
  }

  function showResults(results) {
    const grid = document.getElementById('results-grid');
    grid.innerHTML = results.map(r => {
      if (r.pdf && !r.pdf_filename) r.pdf_filename = r.pdf.split('/').pop();
      return renderResult(r);
    }).join('');
    document.getElementById('results-card').style.display = 'block';
    if (window.innerWidth < 960) {
      document.getElementById('results-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function resetBtn() {
    isRunning = false;
    const btn = document.getElementById('btn-launch');
    btn.disabled = false;
    document.getElementById('btn-icon').textContent = '▶';
    document.getElementById('btn-text').textContent = "Lancer l'audit";
  }

  async function loadHistory() {
    const res  = await fetch('/api/audits');
    const data = await res.json();
    if (!data.length) return;
    const grid = document.getElementById('history-grid');
    grid.innerHTML = data.slice(0, 4).map(renderResult).join('');
    document.getElementById('history-card').style.display = 'block';
  }

  loadHistory();
</script>
</body>
</html>
