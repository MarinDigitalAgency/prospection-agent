<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent SEO Immobilier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0e14;
      --surface: #13151f;
      --border: #1e2235;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Layout ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header span { color: var(--muted); font-size: 13px; margin-left: 4px; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Mode tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      color: var(--muted);
      transition: all .15s;
    }
    .tab.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    /* ── Form ── */
    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="url"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .row { display: flex; gap: 16px; align-items: flex-end; }
    .row .field { flex: 1; }

    .limit-wrap { display: flex; align-items: center; gap: 10px; }
    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .limit-val {
      width: 28px;
      text-align: center;
      font-weight: 600;
      color: var(--accent);
    }

    .btn-launch {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .btn-launch:hover { background: var(--accent-hover); }
    .btn-launch:active { transform: scale(.98); }
    .btn-launch:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── Spinner ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Terminal ── */
    #terminal-card { display: none; }
    .terminal {
      background: #080a0f;
      border-radius: 7px;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12.5px;
      line-height: 1.7;
      max-height: 340px;
      overflow-y: auto;
      border: 1px solid var(--border);
    }
    .log-line { display: flex; gap: 10px; }
    .log-time { color: #3d4a6b; flex-shrink: 0; }
    .log-level { flex-shrink: 0; width: 56px; }
    .log-INFO    .log-level { color: #60a5fa; }
    .log-SUCCESS .log-level { color: var(--success); }
    .log-WARNING .log-level { color: var(--warning); }
    .log-ERROR   .log-level { color: var(--error); }
    .log-text { color: #c9d1e0; word-break: break-all; }

    .terminal-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.running { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    .dot.done    { background: var(--success); }
    .dot.error   { background: var(--error); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    /* ── Results ── */
    #results-card { display: none; }
    .results-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .result-row {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .result-row.error-row { border-color: rgba(239,68,68,.25); }

    .score-badge {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
      border: 2px solid;
    }
    .score-green { color: var(--success); border-color: var(--success); background: rgba(34,197,94,.08); }
    .score-yellow { color: var(--warning); border-color: var(--warning); background: rgba(245,158,11,.08); }
    .score-red { color: var(--error); border-color: var(--error); background: rgba(239,68,68,.08); }
    .score-none { color: var(--muted); border-color: var(--muted); background: transparent; font-size: 20px; }

    .result-info { flex: 1; min-width: 0; }
    .result-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-url { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .result-issues { margin-top: 6px; display: flex; gap: 6px; }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .badge-critical { background: rgba(239,68,68,.15); color: var(--error); }
    .badge-warning  { background: rgba(245,158,11,.15); color: var(--warning); }
    .badge-info     { background: rgba(99,102,241,.15); color: var(--accent); }
    .badge-error    { background: rgba(239,68,68,.1); color: var(--error); border: 1px solid rgba(239,68,68,.2); }

    .btn-pdf {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

    /* ── History ── */
    #history-card { display: none; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 32px;
      color: var(--muted);
    }
    .empty-icon { font-size: 32px; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🏠</div>
  <div>
    <h1>Agent SEO Immobilier <span>— Prospection automatique</span></h1>
  </div>
</header>

<main>

  <!-- ── Formulaire ── -->
  <div class="card">
    <div class="card-title">Nouvel audit</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('batch')">🔍 Recherche ville</button>
      <button class="tab" onclick="switchTab('single')">🌐 Audit URL unique</button>
    </div>

    <!-- Mode batch -->
    <div class="form-panel active" id="panel-batch">
      <div class="row">
        <div class="field">
          <label>Requête Google Places</label>
          <input type="text" id="query" placeholder="agence immobilière Palma" />
        </div>
        <div class="field" style="max-width:180px">
          <label>Nombre de prospects</label>
          <div class="limit-wrap">
            <input type="range" id="limit" min="1" max="20" value="5" oninput="document.getElementById('limit-val').textContent=this.value" />
            <span class="limit-val" id="limit-val">5</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Mode URL unique -->
    <div class="form-panel" id="panel-single">
      <div class="field">
        <label>URL du site</label>
        <input type="url" id="single-url" placeholder="https://agence-exemple.com" />
      </div>
    </div>

    <button class="btn-launch" id="btn-launch" onclick="startAudit()">
      <span id="btn-icon">▶</span>
      <span id="btn-text">Lancer l'audit</span>
    </button>
  </div>

  <!-- ── Terminal ── -->
  <div class="card" id="terminal-card">
    <div class="card-title">Logs en direct</div>
    <div class="terminal-status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">En attente…</span>
    </div>
    <div class="terminal" id="terminal"></div>
  </div>

  <!-- ── Résultats ── -->
  <div class="card" id="results-card">
    <div class="card-title">Résultats</div>
    <div class="results-grid" id="results-grid"></div>
  </div>

  <!-- ── Historique ── -->
  <div class="card" id="history-card">
    <div class="card-title">Dernier audit enregistré</div>
    <div class="results-grid" id="history-grid"></div>
  </div>

</main>

<script>
  let currentMode = 'batch';
  let isRunning = false;

  function switchTab(mode) {
    currentMode = mode;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && mode === 'batch') || (i === 1 && mode === 'single'));
    });
    document.getElementById('panel-batch').classList.toggle('active', mode === 'batch');
    document.getElementById('panel-single').classList.toggle('active', mode === 'single');
  }

  function scoreClass(score) {
    if (score === null || score === undefined) return 'score-none';
    if (score >= 80) return 'score-green';
    if (score >= 50) return 'score-yellow';
    return 'score-red';
  }

  function renderResult(r) {
    const scoreLabel = r.score !== null && r.score !== undefined ? r.score : '—';
    const cls = scoreClass(r.score);
    const issues = r.issues || {};
    const badgesHtml = r.error
      ? `<span class="badge badge-error">Erreur</span>`
      : [
          issues.critical > 0 ? `<span class="badge badge-critical">${issues.critical} critique${issues.critical > 1 ? 's' : ''}</span>` : '',
          issues.warning  > 0 ? `<span class="badge badge-warning">${issues.warning} warning${issues.warning > 1 ? 's' : ''}</span>` : '',
          issues.info     > 0 ? `<span class="badge badge-info">${issues.info} info</span>` : '',
        ].filter(Boolean).join('') || '<span class="badge badge-info">Aucun problème</span>';

    const pdfBtn = r.pdf_filename
      ? `<a class="btn-pdf" href="/pdfs/${r.pdf_filename}" target="_blank">📄 PDF</a>`
      : '';

    return `
      <div class="result-row ${r.error ? 'error-row' : ''}">
        <div class="score-badge ${cls}">${scoreLabel}</div>
        <div class="result-info">
          <div class="result-name">${r.name || r.website}</div>
          <div class="result-url">${r.website || ''}</div>
          <div class="result-issues">${badgesHtml}</div>
        </div>
        ${pdfBtn}
      </div>`;
  }

  function addLogLine(level, time, text) {
    const term = document.getElementById('terminal');
    const div = document.createElement('div');
    div.className = `log-line log-${level}`;
    div.innerHTML = `<span class="log-time">${time}</span><span class="log-level">${level}</span><span class="log-text">${text}</span>`;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
  }

  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    dot.className = `dot ${state}`;
    document.getElementById('status-text').textContent = text;
  }

  async function startAudit() {
    if (isRunning) return;

    const query = document.getElementById('query').value.trim();
    const singleUrl = document.getElementById('single-url').value.trim();
    const limit = parseInt(document.getElementById('limit').value);

    const payload = currentMode === 'batch'
      ? { query, limit }
      : { url: singleUrl };

    if (currentMode === 'batch' && !query) {
      document.getElementById('query').focus();
      return;
    }
    if (currentMode === 'single' && !singleUrl) {
      document.getElementById('single-url').focus();
      return;
    }

    // UI → état chargement
    isRunning = true;
    const btn = document.getElementById('btn-launch');
    btn.disabled = true;
    document.getElementById('btn-icon').innerHTML = '<div class="spinner"></div>';
    document.getElementById('btn-text').textContent = 'Audit en cours…';

    // Afficher terminal
    document.getElementById('terminal-card').style.display = 'block';
    document.getElementById('results-card').style.display = 'none';
    document.getElementById('terminal').innerHTML = '';
    setStatus('running', 'Connexion…');

    // Lancer le job
    const res = await fetch('/api/audit/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const { job_id, error } = await res.json();

    if (error) {
      addLogLine('ERROR', '--:--:--', error);
      resetBtn();
      return;
    }

    setStatus('running', 'Audit en cours…');

    // Stream SSE
    const evtSource = new EventSource(`/api/stream/${job_id}`);

    evtSource.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'ping') return;

      if (msg.type === 'log') {
        addLogLine(msg.level, msg.time, msg.text);
      }

      if (msg.type === 'done') {
        evtSource.close();

        if (msg.status === 'done' && msg.result) {
          setStatus('done', `Terminé — ${msg.result.filter(r => r.pdf).length} audit(s) réussi(s)`);
          showResults(msg.result);
        } else {
          setStatus('error', `Erreur : ${msg.error || 'inconnue'}`);
        }

        resetBtn();
      }
    };

    evtSource.onerror = () => {
      evtSource.close();
      setStatus('error', 'Connexion perdue');
      resetBtn();
    };
  }

  function showResults(results) {
    const grid = document.getElementById('results-grid');
    grid.innerHTML = results.map(r => {
      // Extraire le nom du fichier PDF depuis le chemin complet
      if (r.pdf && !r.pdf_filename) {
        r.pdf_filename = r.pdf.split('/').pop();
      }
      return renderResult(r);
    }).join('');
    document.getElementById('results-card').style.display = 'block';
    document.getElementById('results-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetBtn() {
    isRunning = false;
    const btn = document.getElementById('btn-launch');
    btn.disabled = false;
    document.getElementById('btn-icon').textContent = '▶';
    document.getElementById('btn-text').textContent = 'Lancer l\'audit';
  }

  // ── Charger l'historique au démarrage ──
  async function loadHistory() {
    const res = await fetch('/api/audits');
    const data = await res.json();
    if (!data.length) return;

    const grid = document.getElementById('history-grid');
    grid.innerHTML = data.map(renderResult).join('');
    document.getElementById('history-card').style.display = 'block';
  }

  loadHistory();
</script>
</body>
</html>
